    <script>
      (() => {
        const imagePaths = ["assets/img/cd.webp", "assets/img/cd.jpg"];
        let imagePathIndex = 0;
        const cx = 2083;
        const cy = 1158;
        const r = 487;
        const hubR = Math.round(r * 0.088);

        const canvas = document.getElementById("homeCdCanvas");
        if (!canvas) return;

        const ctx = canvas.getContext("2d");
        const bgCanvas = document.createElement("canvas");
        const bgCtx = bgCanvas.getContext("2d");
        const discCanvas = document.createElement("canvas");
        const discCtx = discCanvas.getContext("2d");
        const hubCanvas = document.createElement("canvas");
        const hubCtx = hubCanvas.getContext("2d");

        const img = new Image();
        const isCoarsePointer = window.matchMedia("(pointer: coarse)").matches;
        const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        const maxRenderWidth = isCoarsePointer ? 1200 : 1800;
        const targetFps = isCoarsePointer ? 20 : 30;
        const frameInterval = 1000 / targetFps;
        let lastTime = 0;
        let lastFrameTime = 0;
        let angle = 0;
        let rafId = 0;
        let isVisible = !("IntersectionObserver" in window);
        let isPageVisible = !document.hidden;
        let renderScale = 1;
        let drawCx = cx;
        let drawCy = cy;
        let drawR = r;
        let drawHubR = hubR;
        const speed = Math.PI / 7.5;
        let canvasReady = false;

        img.onload = () => {
          const { naturalWidth: width, naturalHeight: height } = img;
          renderScale = Math.min(1, maxRenderWidth / width);
          const renderWidth = Math.round(width * renderScale);
          const renderHeight = Math.round(height * renderScale);
          drawCx = cx * renderScale;
          drawCy = cy * renderScale;
          drawR = r * renderScale;
          drawHubR = Math.max(2, Math.round(hubR * renderScale));

          // Crop canvas to just the disc — no background rectangle
          const discPad = Math.round(drawR * 0.24);
          const cropSize = Math.round(drawR * 2) + discPad * 2;
          canvas.width = cropSize;
          canvas.height = cropSize;
          drawCx = drawR + discPad;
          drawCy = drawR + discPad;

          discCanvas.width = Math.round(drawR * 2);
          discCanvas.height = Math.round(drawR * 2);
          discCtx.save();
          discCtx.beginPath();
          discCtx.arc(drawR, drawR, drawR, 0, Math.PI * 2);
          discCtx.clip();
          discCtx.drawImage(img, cx - r, cy - r, r * 2, r * 2, 0, 0, drawR * 2, drawR * 2);
          discCtx.restore();

          hubCanvas.width = drawHubR * 2;
          hubCanvas.height = drawHubR * 2;
          hubCtx.save();
          hubCtx.beginPath();
          hubCtx.arc(drawHubR, drawHubR, drawHubR, 0, Math.PI * 2);
          hubCtx.clip();
          hubCtx.drawImage(
            img,
            cx - hubR,
            cy - hubR,
            hubR * 2,
            hubR * 2,
            0,
            0,
            drawHubR * 2,
            drawHubR * 2
          );
          hubCtx.restore();

          drawFrame();
          canvasReady = true;
          if (!isCoarsePointer) canvas.style.cursor = "grab";
          if (!reduceMotion) start();
        };

        img.onerror = () => {
          imagePathIndex += 1;
          if (imagePathIndex < imagePaths.length) {
            img.src = imagePaths[imagePathIndex];
            return;
          }
          canvas.width = 1280;
          canvas.height = 720;
          ctx.fillStyle = "#0f172a";
          ctx.font = "24px sans-serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText("cd.jpg 加载失败，请确认图片路径。", canvas.width / 2, canvas.height / 2);
        };

        function shouldRun() {
          return isVisible && isPageVisible && !reduceMotion;
        }

        function start() {
          if (rafId || !shouldRun()) return;
          lastTime = 0;
          lastFrameTime = 0;
          rafId = requestAnimationFrame(render);
        }

        function stop() {
          if (!rafId) return;
          cancelAnimationFrame(rafId);
          rafId = 0;
        }

        function drawFrame() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          // No background image — disc floats on page background
          ctx.save();
          ctx.translate(drawCx, drawCy);
          ctx.rotate(angle);
          ctx.drawImage(discCanvas, -drawR, -drawR);
          ctx.restore();
          ctx.drawImage(hubCanvas, drawCx - drawHubR, drawCy - drawHubR);
        }

        function render(t) {
          rafId = 0;
          if (!shouldRun()) return;
          if (lastFrameTime && t - lastFrameTime < frameInterval) {
            rafId = requestAnimationFrame(render);
            return;
          }
          const delta = lastTime ? (t - lastTime) / 1000 : 0;
          lastTime = t;
          lastFrameTime = t;
          angle += delta * speed;

          drawFrame();

          rafId = requestAnimationFrame(render);
        }

        if ("IntersectionObserver" in window) {
          const observer = new IntersectionObserver(
            (entries) => {
              isVisible = entries.some((entry) => entry.isIntersecting || entry.intersectionRatio > 0);
              if (shouldRun()) start();
              else stop();
            },
            { threshold: 0.01 }
          );
          observer.observe(canvas);
        }

        document.addEventListener("visibilitychange", () => {
          isPageVisible = !document.hidden;
          if (shouldRun()) start();
          else stop();
        });

        // Drag-to-spin interaction
        let dragX = 0, dragAngle = 0, dragging = false;

        canvas.addEventListener("touchstart", (e) => {
          if (e.touches.length !== 1) return;
          dragX = e.touches[0].clientX;
          dragAngle = angle;
        }, { passive: true });
        canvas.addEventListener("touchmove", (e) => {
          if (!canvasReady || e.touches.length !== 1) return;
          const dx = e.touches[0].clientX - dragX;
          angle = dragAngle + (dx / (canvas.offsetWidth || 300)) * Math.PI * 3.2;
          drawFrame();
        }, { passive: true });

        canvas.addEventListener("mousedown", (e) => {
          if (!canvasReady) return;
          dragging = true;
          dragX = e.clientX;
          dragAngle = angle;
          canvas.style.cursor = "grabbing";
        });
        window.addEventListener("mousemove", (e) => {
          if (!dragging || !canvasReady) return;
          const dx = e.clientX - dragX;
          angle = dragAngle + (dx / (canvas.offsetWidth || 300)) * Math.PI * 3.2;
          drawFrame();
        });
        window.addEventListener("mouseup", () => {
          if (!dragging) return;
          dragging = false;
          canvas.style.cursor = "grab";
        });

        img.decoding = "async";
        img.src = imagePaths[imagePathIndex];
      })();
    </script>
  </body>
</html>
