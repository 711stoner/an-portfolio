    <style>
      .works-page [data-grid="works"] .work-info {
        display: flex;
        flex-direction: column;
        gap: 10px;
        height: 100%;
      }
      .works-page [data-grid="works"] .work-info h3 {
        min-height: auto;
        margin: 0;
        line-height: 1.22;
      }
      .works-page [data-grid="works"] .work-info p {
        min-height: auto;
        margin: 0;
        line-height: 1.45;
      }
      .works-page [data-modal-desc] {
        white-space: pre-line;
      }
      .works-page [data-grid="works"] .platform-row {
        display: none !important;
      }

      /* 流动光晕动画背景 / Aurora Animated Background */
      body.works-page {
        background: transparent !important;
      }

      #aurora-bg {
        position: fixed;
        inset: 0;
        z-index: -1;
        overflow: hidden;
        background: #080c14;
        pointer-events: none;
      }

      .aurora-blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(90px);
        will-change: transform;
      }

      .aurora-blob.b1 {
        width: 680px;
        height: 680px;
        background: rgba(96, 144, 255, 0.6);
        top: -8%;
        left: -6%;
        animation: auroraFloat1 24s ease-in-out infinite;
      }

      .aurora-blob.b2 {
        width: 560px;
        height: 560px;
        background: rgba(150, 90, 255, 0.55);
        top: 38%;
        right: -8%;
        animation: auroraFloat2 29s ease-in-out infinite;
      }

      .aurora-blob.b3 {
        width: 520px;
        height: 520px;
        background: rgba(60, 200, 255, 0.5);
        bottom: -10%;
        left: 18%;
        animation: auroraFloat3 34s ease-in-out infinite;
      }

      .aurora-blob.b4 {
        width: 460px;
        height: 460px;
        background: rgba(255, 110, 180, 0.4);
        top: 12%;
        left: 42%;
        animation: auroraFloat4 27s ease-in-out infinite;
      }

      @keyframes auroraFloat1 {
        0%, 100% { transform: translate(0, 0) scale(1); }
        33% { transform: translate(180px, 120px) scale(1.2); }
        66% { transform: translate(80px, 260px) scale(0.9); }
      }

      @keyframes auroraFloat2 {
        0%, 100% { transform: translate(0, 0) scale(1); }
        33% { transform: translate(-160px, 100px) scale(0.85); }
        66% { transform: translate(-90px, -140px) scale(1.25); }
      }

      @keyframes auroraFloat3 {
        0%, 100% { transform: translate(0, 0) scale(1); }
        50% { transform: translate(220px, -160px) scale(1.15); }
      }

      @keyframes auroraFloat4 {
        0%, 100% { transform: translate(0, 0) scale(1); }
        40% { transform: translate(-200px, 180px) scale(1.1); }
        70% { transform: translate(140px, -100px) scale(0.8); }
      }

      @media (prefers-reduced-motion: reduce) {
        .aurora-blob { animation: none !important; }
      }
    </style>
